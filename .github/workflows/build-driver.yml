name: Build hipro Driver

on:
  workflow_dispatch:

jobs:
  build-driver:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install WDK
      run: |
        # Download WDK installer
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2249371"
        $wdkInstaller = "$env:TEMP\wdksetup.exe"
        Write-Host "Downloading WDK..."
        Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkInstaller -UseBasicParsing
        
        Write-Host "Installing WDK (this may take 5-10 minutes)..."
        Start-Process -FilePath $wdkInstaller -ArgumentList "/quiet", "/norestart" -Wait
        
        # Wait for installation to complete
        Write-Host "Waiting for WDK installation to finalize..."
        Start-Sleep -Seconds 60
        
        # List all Windows Kits directories to debug
        Write-Host "=== Checking Windows Kits directories ==="
        Get-ChildItem "C:\Program Files (x86)\Windows Kits" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "Found: $($_.FullName)" }
        Get-ChildItem "C:\Program Files\Windows Kits" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "Found: $($_.FullName)" }
        
        # Find ntifs.h
        Write-Host "=== Searching for ntifs.h ==="
        $ntifsFiles = Get-ChildItem "C:\Program Files" -Recurse -Filter "ntifs.h" -ErrorAction SilentlyContinue -Depth 6
        if ($ntifsFiles) {
            Write-Host "Found ntifs.h at: $($ntifsFiles[0].FullName)"
            $ntifsFiles[0].Directory.Parent.Parent.FullName | Out-File -FilePath $env:TEMP\wdk_path.txt
        } else {
            Write-Error "ntifs.h not found!"
            exit 1
        }

    - name: Find MSBuild
      run: |
        $msbuildPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
        echo "MSBUILD_PATH=$msbuildPath" >> $env:GITHUB_ENV
        Write-Host "MSBuild found: $msbuildPath"

    - name: Build Driver
      run: |
        # Read WDK path from previous step
        $wdkBasePath = Get-Content $env:TEMP\wdk_path.txt
        Write-Host "WDK base path: $wdkBasePath"
        
        # Find SDK version
        $includePath = Join-Path $wdkBasePath "include"
        $sdkVersion = (Get-ChildItem $includePath -Directory | Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } | Sort-Object Name -Descending | Select-Object -First 1).Name
        
        if (-not $sdkVersion) {
            Write-Error "No SDK version found"
            exit 1
        }
        
        Write-Host "Using SDK version: $sdkVersion"
        Write-Host "WDK include path: $includePath\$sdkVersion\km"
        
        # Verify ntifs.h exists
        $ntifsPath = Join-Path $includePath "$sdkVersion\km\ntifs.h"
        if (Test-Path $ntifsPath) {
            Write-Host "✓ Found ntifs.h at: $ntifsPath"
        } else {
            Write-Error "ntifs.h not found at: $ntifsPath"
            exit 1
        }
        
        # Build with explicit include paths
        Write-Host "Building driver..."
        & $env:MSBUILD_PATH ObRegisterCallbacks.vcxproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=$sdkVersion `
          /p:SpectreMitigation=false `
          /p:OutDir="$PWD\x64\Release\" `
          /t:Rebuild `
          /v:normal

    - name: Upload Driver
      uses: actions/upload-artifact@v4
      with:
        name: hipro-sys
        path: x64/Release/hipro.sys
        retention-days: 7
