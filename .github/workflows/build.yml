name: Build hipro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Framework
      run: |
        choco install netfx-4.8-devpack -y

    - name: Install WDK
      run: |
        Write-Host "=== Installing WDK ==="
        
        # Download WDK installer from Microsoft
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2249371"
        $installer = "$env:TEMP\wdksetup.exe"
        
        Write-Host "Downloading WDK installer..."
        Invoke-WebRequest -Uri $wdkUrl -OutFile $installer -UseBasicParsing
        Write-Host "Download complete: $((Get-Item $installer).Length / 1MB) MB"
        
        # Install WDK
        Write-Host "Installing WDK (this will take 5-10 minutes)..."
        Start-Process -FilePath $installer -ArgumentList "/quiet", "/norestart" -Wait -NoNewWindow
        
        # Wait for installation to finalize
        Write-Host "Waiting for installation to complete..."
        Start-Sleep -Seconds 60
        
        # Refresh environment
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        
        # Find ntifs.h
        Write-Host "Searching for ntifs.h..."
        $ntifs = Get-ChildItem "C:\Program Files (x86)\Windows Kits","C:\Program Files\Windows Kits" -Recurse -Filter "ntifs.h" -ErrorAction SilentlyContinue -Depth 8 | Select-Object -First 1
        
        if ($ntifs) {
            Write-Host "SUCCESS! Found ntifs.h at: $($ntifs.FullName)"
            $kmDir = $ntifs.Directory.FullName
            $sdkDir = $ntifs.Directory.Parent.FullName
            $wdkVersion = $ntifs.Directory.Parent.Name
            
            Write-Host "WDK Version: $wdkVersion"
            
            echo "WDK_VERSION=$wdkVersion" >> $env:GITHUB_ENV
            echo "WDK_KM_PATH=$kmDir" >> $env:GITHUB_ENV
            echo "WDK_SHARED_PATH=$sdkDir\shared" >> $env:GITHUB_ENV
            echo "WDK_UM_PATH=$sdkDir\um" >> $env:GITHUB_ENV
        } else {
            Write-Error "CRITICAL: ntifs.h not found after installation!"
            Write-Host "Checking Windows Kits directory:"
            Get-ChildItem "C:\Program Files (x86)\Windows Kits","C:\Program Files\Windows Kits" -ErrorAction SilentlyContinue | ForEach-Object {
                Write-Host "  - $($_.FullName)"
            }
            exit 1
        }
        
        # Find installed Windows SDK version
        Write-Host "=== Finding SDK Version ==="
        $sdkPath = "C:\Program Files (x86)\Windows Kits\10\Include"
        if (-not (Test-Path $sdkPath)) {
            $sdkPath = "C:\Program Files\Windows Kits\10\Include"
        }
        
        $sdkVersion = (Get-ChildItem $sdkPath -Directory | Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } | Sort-Object Name -Descending | Select-Object -First 1).Name
        
        if (-not $sdkVersion) {
            Write-Error "No Windows SDK found"
            exit 1
        }
        
        echo "SDK_VERSION=$sdkVersion" >> $env:GITHUB_ENV
        Write-Host "SDK Version: $sdkVersion"
        Write-Host "WDK Version: $wdkVersion (for include paths only)"

    - name: Build Driver
      run: |
        Write-Host "=== Building Driver ==="
        Write-Host "SDK Version: $env:SDK_VERSION"
        Write-Host "WDK Version: $env:WDK_VERSION"
        Write-Host "KM Path: $env:WDK_KM_PATH"
        
        # Find MSBuild
        $msbuildPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
        
        # Set INCLUDE
        $env:INCLUDE = "$env:WDK_KM_PATH;$env:WDK_SHARED_PATH;$env:WDK_UM_PATH;$env:INCLUDE"
        Write-Host "INCLUDE=$env:INCLUDE"
        
        # Build - use SDK_VERSION for WindowsTargetPlatformVersion
        & $msbuildPath ObRegisterCallbacks.vcxproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=$env:SDK_VERSION `
          /p:SpectreMitigation=false `
          /p:OutDir="$PWD\x64\Release\" `
          /t:Rebuild `
          /v:minimal

    - name: Build Client
      run: |
        $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
        $outputDir = "Bin"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
        
        & $csc /target:winexe /out:"$outputDir/hipro.exe" /platform:x64 /optimize+ /utf8output `
          /reference:System.dll `
          /reference:System.Core.dll `
          /reference:System.Windows.Forms.dll `
          /reference:System.Drawing.dll `
          /reference:System.ServiceProcess.dll `
          Program.cs MainForm.cs ClientLib.cs DriverService.cs

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hipro-Build
        path: |
          x64/Release/hipro.sys
          Bin/hipro.exe
        retention-days: 7
