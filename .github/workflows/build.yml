name: Build hipro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Framework
      run: |
        choco install netfx-4.8-devpack -y

    - name: Setup WDK
      run: |
        # GitHub Actions windows-latest already has WDK pre-installed
        # Just find MSBuild and SDK version
        
        # Find MSBuild path
        $msbuildPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
        echo "MSBUILD_PATH=$msbuildPath" >> $env:GITHUB_ENV
        
        # Find installed Windows SDK version
        $sdkPath = "C:\Program Files (x86)\Windows Kits\10\Include"
        $sdkVersion = (Get-ChildItem $sdkPath -Directory | Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } | Sort-Object Name -Descending | Select-Object -First 1).Name
        if (-not $sdkVersion) {
            Write-Error "No Windows SDK found"
            exit 1
        }
        echo "SDK_VERSION=$sdkVersion" >> $env:GITHUB_ENV
        Write-Host "Found SDK version: $sdkVersion"
        
        # Verify ntifs.h exists
        $ntifsPath = "$sdkPath\$sdkVersion\km\ntifs.h"
        if (Test-Path $ntifsPath) {
            Write-Host "Found ntifs.h at: $ntifsPath"
        } else {
            Write-Warning "ntifs.h not found at expected location"
            # Search for it
            $found = Get-ChildItem "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "ntifs.h" -ErrorAction SilentlyContinue -Depth 5 | Select-Object -First 1
            if ($found) {
                Write-Host "Found ntifs.h at: $($found.FullName)"
            }
        }

    - name: Build Driver
      run: |
        Write-Host "Building with SDK version: $env:SDK_VERSION"
        
        # Set INCLUDE environment variable for compiler
        $wdkInclude = "C:\Program Files (x86)\Windows Kits\10\Include\$env:SDK_VERSION"
        $env:INCLUDE = "$wdkInclude\km;$wdkInclude\shared;$wdkInclude\um;$env:INCLUDE"
        Write-Host "INCLUDE path set: $env:INCLUDE"
        
        # Build with detected SDK version
        & $env:MSBUILD_PATH ObRegisterCallbacks.vcxproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=$env:SDK_VERSION `
          /p:SpectreMitigation=false `
          /p:OutDir="$PWD\x64\Release\" `
          /t:Rebuild

    - name: Build Client
      run: |
        $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
        $outputDir = "Bin"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
        
        & $csc /target:winexe /out:"$outputDir/hipro.exe" /platform:x64 /optimize+ /utf8output `
          /reference:System.dll `
          /reference:System.Core.dll `
          /reference:System.Windows.Forms.dll `
          /reference:System.Drawing.dll `
          /reference:System.ServiceProcess.dll `
          Program.cs MainForm.cs ClientLib.cs DriverService.cs

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hipro-Build
        path: |
          x64/Release/hipro.sys
          Bin/hipro.exe
        retention-days: 7
