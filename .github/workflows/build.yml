name: Build hipro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Framework
      run: |
        choco install netfx-4.8-devpack -y

    - name: Find WDK
      run: |
        Write-Host "Searching entire C: drive for ntifs.h..."
        
        # Search Program Files
        $ntifs = Get-ChildItem "C:\Program Files" -Recurse -Filter "ntifs.h" -ErrorAction SilentlyContinue -Depth 8 | Select-Object -First 1
        
        if (-not $ntifs) {
            # Try Program Files (x86)
            $ntifs = Get-ChildItem "C:\Program Files (x86)" -Recurse -Filter "ntifs.h" -ErrorAction SilentlyContinue -Depth 8 | Select-Object -First 1
        }
        
        if ($ntifs) {
            Write-Host "SUCCESS! Found ntifs.h at: $($ntifs.FullName)"
            $kmDir = $ntifs.Directory.FullName
            $sdkDir = $ntifs.Directory.Parent.FullName
            $kitsDir = $ntifs.Directory.Parent.Parent.FullName
            $wdkVersion = $ntifs.Directory.Parent.Name
            
            Write-Host "WDK Version: $wdkVersion"
            Write-Host "Kits Dir: $kitsDir"
            
            echo "WDK_VERSION=$wdkVersion" >> $env:GITHUB_ENV
            echo "WDK_KM_PATH=$kmDir" >> $env:GITHUB_ENV
            echo "WDK_SHARED_PATH=$sdkDir\shared" >> $env:GITHUB_ENV
            echo "WDK_UM_PATH=$sdkDir\um" >> $env:GITHUB_ENV
            echo "WDK_KITS_PATH=$kitsDir" >> $env:GITHUB_ENV
        } else {
            Write-Host "ntifs.h not found, installing WDK..."
            
            # Install WDK
            winget install --id Microsoft.WindowsWDK.10.0 -e --accept-source-agreements --accept-package-agreements --silent
            
            # Wait
            Write-Host "Waiting for installation (2 minutes)..."
            Start-Sleep -Seconds 120
            
            # Refresh
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            
            # Search again
            $ntifs = Get-ChildItem "C:\Program Files" -Recurse -Filter "ntifs.h" -ErrorAction SilentlyContinue -Depth 8 | Select-Object -First 1
            
            if (-not $ntifs) {
                $ntifs = Get-ChildItem "C:\Program Files (x86)" -Recurse -Filter "ntifs.h" -ErrorAction SilentlyContinue -Depth 8 | Select-Object -First 1
            }
            
            if ($ntifs) {
                Write-Host "SUCCESS after install! Found at: $($ntifs.FullName)"
                $kmDir = $ntifs.Directory.FullName
                $sdkDir = $ntifs.Directory.Parent.FullName
                $kitsDir = $ntifs.Directory.Parent.Parent.FullName
                $wdkVersion = $ntifs.Directory.Parent.Name
                
                echo "WDK_VERSION=$wdkVersion" >> $env:GITHUB_ENV
                echo "WDK_KM_PATH=$kmDir" >> $env:GITHUB_ENV
                echo "WDK_SHARED_PATH=$sdkDir\shared" >> $env:GITHUB_ENV
                echo "WDK_UM_PATH=$sdkDir\um" >> $env:GITHUB_ENV
                echo "WDK_KITS_PATH=$kitsDir" >> $env:GITHUB_ENV
            } else {
                Write-Error "Failed to find or install WDK"
                exit 1
            }
        }

    - name: Build Driver
      run: |
        Write-Host "=== Build Driver ==="
        Write-Host "WDK Version: $env:WDK_VERSION"
        Write-Host "KM Path: $env:WDK_KM_PATH"
        
        # Find MSBuild
        $msbuildPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
        
        # Set INCLUDE
        $env:INCLUDE = "$env:WDK_KM_PATH;$env:WDK_SHARED_PATH;$env:WDK_UM_PATH;$env:INCLUDE"
        Write-Host "INCLUDE=$env:INCLUDE"
        
        # Build
        & $msbuildPath ObRegisterCallbacks.vcxproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=$env:WDK_VERSION `
          /p:SpectreMitigation=false `
          /p:OutDir="$PWD\x64\Release\" `
          /t:Rebuild `
          /v:minimal

    - name: Build Client
      run: |
        $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
        $outputDir = "Bin"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
        
        & $csc /target:winexe /out:"$outputDir/hipro.exe" /platform:x64 /optimize+ /utf8output `
          /reference:System.dll `
          /reference:System.Core.dll `
          /reference:System.Windows.Forms.dll `
          /reference:System.Drawing.dll `
          /reference:System.ServiceProcess.dll `
          Program.cs MainForm.cs ClientLib.cs DriverService.cs

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hipro-Build
        path: |
          x64/Release/hipro.sys
          Bin/hipro.exe
        retention-days: 7
